name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            fetch: fetch-adb-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            fetch: fetch-adb-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install frontend deps
        run: npm ci

      - name: Fetch ADB (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: make ${{ matrix.fetch }}

      - name: Fetch ADB (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "$env:TEMP\platform-tools-windows.zip"
          Expand-Archive -Path "$env:TEMP\platform-tools-windows.zip" -DestinationPath "$env:TEMP\pt" -Force
          Copy-Item "$env:TEMP\pt\platform-tools\adb.exe" "src-tauri/binaries/adb-toolkit-adb-x86_64-pc-windows-msvc.exe"
          Copy-Item "$env:TEMP\pt\platform-tools\AdbWinApi.dll" "src-tauri/binaries/"
          Copy-Item "$env:TEMP\pt\platform-tools\AdbWinUsbApi.dll" "src-tauri/binaries/"
          Remove-Item -Recurse -Force "$env:TEMP\pt","$env:TEMP\platform-tools-windows.zip"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ADB Toolkit ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
